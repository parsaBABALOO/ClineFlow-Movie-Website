<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Modern Movie Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
</head>
<body class="dark-theme">

    <div class="custom-cursor"></div>
    <div class="cursor-ripple"></div>

    <div id="loader">
        <div class="loader-content">
            <img src="assets/logo.png" alt="CineFlow Logo" class="loader-logo">
            <div class="loader-circle"></div>
            <span class="loader-percentage">0%</span>
        </div>
    </div>

    <div id="particles-js"></div>

    <header class="main-header">
        <nav class="navbar">
            <div class="logo">CineFlow</div>
            <div class="nav-controls">
                <button id="search-toggle"><i class="fas fa-search"></i></button>
                <button id="theme-btn"><i class="fas fa-moon"></i></button>
                <button id="music-btn"><i class="fas fa-music"></i></button>
                <div id="live-clock">00:00:00</div> </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section">
            <video autoplay muted loop id="hero-video">
                <source src="assets/video/hero-bg.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="typed-text"></h1>
                <p>Experience cinema like never before.</p>
                <button class="glass-btn">Explore Movies</button>
            </div>
        </section>

        <section id="search-section" class="section-padding">
            </section>

        <section id="movies" class="section-padding" data-aos="fade-up">
            </section>

        <section id="trending" class="section-padding" data-aos="zoom-in">
            </section>

        <section id="counters" class="section-padding" data-aos="fade-left">
            </section>

        <section id="stats-chart" class="section-padding" data-aos="fade-right">
            </section>

        <section id="testimonials" class="section-padding" data-aos="slide-up">
            </section>

        <section id="contact" class="section-padding" data-aos="fade-up">
            </section>
    </main>

    <footer class="main-footer">
        </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <script src="js/components.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
